openapi: 3.0.3
info:
  title: Categories API
  version: 1.0.0

security:
  - bearerAuth: []

paths:
  /categories:
    post:
      summary: Create user category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryDto'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

    get:
      summary: List visible categories
      tags: [Categories]
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
        '401':
          description: Unauthorized

  /categories/{id}:
    get:
      summary: Get category by id
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      summary: Update owned user category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryDto'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      summary: Delete owned user category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Category deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateCategoryDto:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [expense, income]
        isSystem:
          type: boolean
          description: Ignored/blocked for non-system users

    UpdateCategoryDto:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [expense, income]
        isSystem:
          type: boolean
          description: Ignored/blocked for user categories

    CategoryResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [expense, income]
        isSystem:
          type: boolean
        ownerUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
