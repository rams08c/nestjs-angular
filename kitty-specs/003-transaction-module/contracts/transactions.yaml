openapi: "3.0.3"
info:
  title: Transactions API
  version: "1.0"

security:
  - bearerAuth: []

paths:
  /transactions:
    get:
      summary: List authenticated user's transactions
      tags: [Transactions]
      parameters:
        - { name: groupId,    in: query, schema: { type: string } }
        - { name: categoryId, in: query, schema: { type: string } }
        - { name: from,       in: query, schema: { type: string, format: date } }
        - { name: to,         in: query, schema: { type: string, format: date } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/TransactionResponse' } } } } }
        "401": { description: Unauthorized }

    post:
      summary: Create a transaction
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTransactionDto' }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/TransactionResponse' } } } }
        "400": { description: Validation error }
        "401": { description: Unauthorized }

  /transactions/{id}:
    get:
      summary: Get a transaction by ID
      tags: [Transactions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TransactionResponse' } } } }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

    put:
      summary: Update a transaction
      tags: [Transactions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTransactionDto' }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TransactionResponse' } } } }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

    delete:
      summary: Delete a transaction
      tags: [Transactions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateTransactionDto:
      type: object
      required: [categoryId, amount, currency, transactionDate]
      properties:
        categoryId:      { type: string }
        groupId:         { type: string, nullable: true }
        amount:          { type: number, format: double, exclusiveMinimum: 0 }
        currency:        { type: string, minLength: 3, maxLength: 3, description: "ISO 4217 (e.g. USD)" }
        note:            { type: string, nullable: true }
        transactionDate: { type: string, format: date }

    UpdateTransactionDto:
      type: object
      properties:
        categoryId:      { type: string }
        groupId:         { type: string, nullable: true }
        amount:          { type: number, format: double, exclusiveMinimum: 0 }
        currency:        { type: string, minLength: 3, maxLength: 3 }
        note:            { type: string, nullable: true }
        transactionDate: { type: string, format: date }

    TransactionResponse:
      type: object
      properties:
        id:              { type: string }
        ownerUserId:     { type: string }
        categoryId:      { type: string }
        groupId:         { type: string, nullable: true }
        amount:          { type: string, description: "Decimal string" }
        currency:        { type: string }
        note:            { type: string, nullable: true }
        transactionDate: { type: string, format: date }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
