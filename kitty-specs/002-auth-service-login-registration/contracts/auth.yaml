openapi: "3.0.3"
info:
  title: Auth API
  version: "1.0"
  description: Authentication endpoints for register, login, and refresh token flows.

paths:
  /auth/register:
    post:
      summary: Register a new account
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        "201":
          description: Account registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        "400":
          description: Invalid input
        "409":
          description: Email already exists

  /auth/login:
    post:
      summary: Login with email and password
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDto'
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPair'
        "401":
          description: Invalid or expired refresh token

components:
  schemas:
    RegisterDto:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RefreshDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1

    AuthTokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
